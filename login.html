<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f1f5f9;
}

.hero {
  background: linear-gradient(rgba(8,27,51,.9), rgba(8,27,51,.9)),
  url('https://images.unsplash.com/photo-1559526324-593bc073d938?auto=format&fit=crop&w=1600&q=80');
  background-size: cover;
  background-position: center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="bg-white shadow-md fixed w-full top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center p-5">

<h1 class="text-xl font-bold text-blue-900">
North Point Capital
</h1>

<div class="space-x-6 hidden md:block">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="signup.html">Sign Up</a>
</div>

</div>
</nav>

<!-- HERO -->
<section class="hero h-[220px] flex items-center justify-center text-white text-center mt-20">
<div>
<h1 class="text-4xl font-bold">Welcome Back</h1>
<p class="text-blue-200 mt-2">Login to access your dashboard</p>
</div>
</section>

<!-- LOGIN FORM -->
<section class="py-16">
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">

<h2 class="text-3xl font-bold text-center text-blue-900 mb-8">
Login
</h2>

<form id="loginForm" class="space-y-5">

<!-- Email -->
<div>
<label class="font-semibold">Email</label>
<input type="email" id="email" placeholder="Enter your email"
class="w-full border p-3 rounded-lg mt-2" required>
</div>

<!-- Password -->
<div>
<label class="font-semibold">Password</label>
<input type="password" id="password" placeholder="Enter password"
class="w-full border p-3 rounded-lg mt-2" required>
</div>

<!-- Remember -->
<div class="flex justify-between items-center text-sm">
<label>
<input type="checkbox"> Remember me
</label>

<a href="#" class="text-blue-900">Forgot password?</a>
</div>

<!-- Button -->
<button type="submit"
class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold hover:bg-blue-800 transition">
Login
</button>

</form>

<p class="text-center mt-6 text-gray-600">
Don't have an account?
<a href="signup.html" class="text-blue-900 font-bold">Sign Up</a>
</p>

</div>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

<script>
// 🔑 LOGIN LOGIC
function showToast(msg, isError=false){
  const t=document.createElement("div");
  t.innerText=msg;
  t.style.position="fixed";
  t.style.top="20px";
  t.style.right="20px";
  t.style.padding="12px 16px";
  t.style.borderRadius="8px";
  t.style.color="#fff";
  t.style.background=isError?"#dc2626":"#1e3a8a";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  try{
    showToast("Logging in...");

    const userCredential = await auth.signInWithEmailAndPassword(email,password);
    const user = userCredential.user;

    if(!user.emailVerified){
      showToast("Please verify your email first", true);
      return;
    }

    showToast("Login successful");

    setTimeout(()=>{
      window.location.href="dashboard.html";
    },1500);

  }catch(err){
    showToast(err.message,true);
  }
});
</script>

</body>
</html>
